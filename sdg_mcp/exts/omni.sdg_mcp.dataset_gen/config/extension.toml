[package]
version = "0.1.0"
title = "SDG Dataset Generator"
description = "Place real warehouse props with semantic labels, attach a camera ring, and run Replicator to emit an annotated synthetic dataset (RGB/depth/segmentation/bbox)."
category = "Tools"
keywords = ["sdg", "replicator", "synthetic-data", "sensors", "demo"]
authors = ["omniverse-kit-mcp / sdg_mcp"]

[dependencies]
"omni.kit.uiapp" = {}
"omni.ui" = {}
"omni.usd" = {}
"omni.kit.commands" = {}
"omni.replicator.core" = {}

[[python.module]]
name = "omni.sdg_mcp.dataset_gen"
