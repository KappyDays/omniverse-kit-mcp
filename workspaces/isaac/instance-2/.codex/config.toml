# Codex CLI workspace config — loaded when running `codex` from this workspace folder
# Mirrors sibling .mcp.json (Claude Code) — drift guarded by tests/unit/test_codex_entrypoint_sync.py

project_doc_fallback_filenames = ["CLAUDE.md"]
project_doc_max_bytes = 65536

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true   # localhost:8112 Extension REST 호출 필수

[mcp_servers.isaacsim-mcp-2]
command = "cmd"
args = ["/c", "uv", "--directory", "../../..", "run", "--no-sync", "omniverse-kit-mcp"]
env = { ISAAC_MCP_APP_PROFILE = "isaac-sim", ISAAC_MCP_INSTANCE_ID = "2" }
