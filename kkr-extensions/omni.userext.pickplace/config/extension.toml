[package]
version = "0.1.0"
title = "Pick & Place Workshop"
description = "Independent Isaac Sim 5.1 extension that builds an O-shaped conveyor loop with two Franka arms performing autonomous pick-and-place on dynamic cubes."
category = "Tutorial"
keywords = ["pick-place", "conveyor", "franka", "isaac-sim", "workshop"]
authors = ["KappyDays"]
repository = ""

[dependencies]
"omni.kit.uiapp" = {}
"omni.ui" = {}
"omni.usd" = {}
"omni.physx" = {}
"omni.timeline" = {}
"omni.kit.commands" = {}
"omni.kit.async_engine" = {}
# v5 NVIDIA wiring — Conveyor (CreateConveyorBelt + ConveyorBuilder API):
# .conveyor = OmniGraph Kit command (asset + ActionGraph)
# .conveyor.ui = ConveyorBuilder/ConveyorTrack programmatic API
#                (anchor-chain auto-alignment, GUI 우회)
# 둘 다 default disabled — declare 필수.
"isaacsim.asset.gen.conveyor" = {}
"isaacsim.asset.gen.conveyor.ui" = {}
# v4 NVIDIA wiring — Franka + ParallelGripper + PickPlaceController.
"isaacsim.robot.manipulators" = {}
"isaacsim.robot.manipulators.examples" = {}

[[python.module]]
name = "omni.userext.pickplace"
