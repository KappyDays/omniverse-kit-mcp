[package]
version = "0.1.0"
title = "NavMesh Playground"
description = "Spawn random People/Robot on warehouse NavMesh, drive them via NavMesh-based paths. People use Walk+Sit animations; Robots use DifferentialController-based physics wheels."
category = "Simulation"
keywords = ["navmesh", "character", "robot", "demo", "navigation"]

[dependencies]
# Minimal toml deps. Heavy bundles (omni.anim.graph.bundle, omni.anim.navigation.bundle,
# isaacsim.robot.wheeled_robots, isaacsim.core.prims, isaacsim.replicator.agent.core) are
# auto-activated via ISAAC_SIM_EXTRA_EXT_IDS in .env so the toml stays lean and
# Kit boot doesn't fail if a dep is renamed/moved across Kit versions.
# Independent extension — validation_api 의존 금지 (2026-04-22 정책).
"omni.kit.uiapp" = {}
"omni.ui" = {}

[[python.module]]
name = "omni.mycompany.navmesh_playground"
