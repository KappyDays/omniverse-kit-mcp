apiVersion: isaacsim.validation/v1
kind: Scenario
metadata:
  id: usd_load_robot
  name: "Smoke: USD load (local asset) → prim exists → position verified"
  tags: [smoke, usd-load, phase-a]

spec:
  defaults:
    stepTimeoutSeconds: 90
    failFast: true

  variables:
    # Public Isaac Sim asset — avoids machine-local install paths. Override
    # with input_overrides to test local USDs or omniverse:// assets.
    usd_url: "https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/6.0/Isaac/Robots/NVIDIA/NovaCarter/nova_carter.usd"
    prim_path: "/World/TestAsset"
    load_position: [1.0, 2.0, 0.5]

  arrange:
    - id: load_robot_usd
      module: simulation
      action: stage_load_usd
      args:
        usd_url: ${variables.usd_url}
        prim_path: ${variables.prim_path}
        position: ${variables.load_position}

  assert:
    - id: robot_prim_exists
      module: stage
      action: assert_prim_exists
      args:
        prim_path: ${variables.prim_path}
        should_exist: true

    - id: robot_position_verified
      module: stage
      action: assert_property
      args:
        prim_path: ${variables.prim_path}
        property_name: xformOp:translate
        comparator: approx
        expected_value: ${variables.load_position}
        tolerance: 0.001

  cleanup:
    - id: remove_robot
      module: simulation
      action: stage_delete_prim
      args:
        prim_path: ${variables.prim_path}
