apiVersion: isaacsim.validation/v1
kind: Scenario
metadata:
  id: sensor_imu
  name: "Phase G: NovaCarter chassis → attach IMUSensor → assert prim exists"
  tags: [smoke, sensor, phase-g, imu]

spec:
  defaults:
    stepTimeoutSeconds: 300
    failFast: true

  variables:
    nova_carter_url: "https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/6.0/Isaac/Robots/NVIDIA/NovaCarter/nova_carter.usd"
    prim_path: "/World/NovaCarter"

  arrange:
    - id: load_robot
      module: robot
      action: load
      args:
        usd_url: ${variables.nova_carter_url}
        prim_path: ${variables.prim_path}
        position: [0.0, 0.0, 0.0]

  act:
    - id: attach_imu
      module: sensor
      action: attach_imu
      args:
        prim_path: ${variables.prim_path}
        sensor_name: MainImu
        frequency: 500
        mount_offset: [0.0, 0.0, 0.15]
        mount_orientation: [1.0, 0.0, 0.0, 0.0]

  assert:
    - id: imu_prim_exists
      module: stage
      action: assert_prim_exists
      args:
        prim_path: /World/NovaCarter/MainImu
        should_exist: true

  cleanup:
    - id: stop_timeline
      module: simulation
      action: stop
      args: {}

    - id: remove_imu
      module: simulation
      action: stage_delete_prim
      args:
        prim_path: /World/NovaCarter/MainImu
      continueOnFailure: true

    - id: remove_robot
      module: simulation
      action: stage_delete_prim
      args:
        prim_path: ${variables.prim_path}
