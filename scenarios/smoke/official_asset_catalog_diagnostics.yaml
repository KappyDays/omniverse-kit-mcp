apiVersion: isaacsim.validation/v1
kind: Scenario
metadata:
  id: official_asset_catalog_diagnostics
  name: Official Asset Catalog Diagnostics
  tags: [smoke, asset, official, diagnostics]

spec:
  defaults:
    stepTimeoutSeconds: 60
    failFast: true
  assert:
    - id: check_isaac_catalog
      module: asset
      action: official_sync_status
      args:
        app_profile: isaac-sim

    - id: search_known_miss
      module: asset
      action: official_search
      args:
        query: definitely-not-a-real-official-asset-name-zzzz
        kind: asset
        app_profile: isaac-sim
        min_status: discovered
        limit: 5

    - id: search_pallet_asset
      module: asset
      action: official_search
      args:
        query: pallet
        kind: asset
        app_profile: isaac-sim
        min_status: url_validated
        limit: 3

    - id: resolve_pallet_asset
      module: asset
      action: official_resolve
      args:
        name_or_id: pallet
        kind: asset
        app_profile: isaac-sim
        prefer_loadable: true

    - id: get_pallet_wrong_profile
      module: asset
      action: official_get
      continueOnFailure: true
      args:
        asset_id: https://omniverse-content-staging.s3.us-west-2.amazonaws.com/Assets/simready_content/common_assets/props/aluminumpallet_a01/aluminumpallet_a01.usd
        app_profile: kit-app
