apiVersion: isaacsim.validation/v1
kind: Scenario
metadata:
  id: character_control
  name: "Phase C smoke: asset_list(people) → character load → animation → navigate → job"
  tags: [smoke, character, phase-c, asset-browser, animgraph]

spec:
  defaults:
    # First run downloads a 6.0 character skin plus BehaviorAgent/IRA assets
    # from the public S3 bucket and spins up NavMesh — give it headroom.
    stepTimeoutSeconds: 300
    failFast: true

  variables:
    character_url: "https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/6.0/Isaac/People/Characters/F_Business_02/F_Business_02.usd"
    # Place under /World/Characters so the returned sanitized_prim_path will be
    # identical to the requested prim_path and downstream steps can use the same
    # variable.
    char_prim_path: "/World/Characters/Visitor"
    spawn_position: [0.0, 0.0, 0.0]
    nav_target: [1.5, 0.0, 0.0]

  arrange:
    - id: browse_people_catalog
      module: asset
      action: list
      args:
        category: people
        max_entries: 20

    - id: load_character
      module: character
      action: load
      args:
        usd_url: ${variables.character_url}
        prim_path: ${variables.char_prim_path}
        position: ${variables.spawn_position}
        yaw: 0.0

  act:
    # Character runtime registers only after the timeline ticks at least once.
    # The warm-up also lets _ensure_animation_ready succeed on the first real
    # play_animation call.
    - id: warm_up_timeline_play
      module: simulation
      action: play
      args: {}

    - id: warm_up_timeline_pause
      module: simulation
      action: pause
      args: {}

    - id: play_walk_animation
      module: character
      action: play_animation
      args:
        prim_path: ${variables.char_prim_path}
        animation_name: Walk
        speed: 1.0
        target_position: ${variables.nav_target}

    - id: navigate_to_target
      module: character
      action: navigate_to
      args:
        prim_path: ${variables.char_prim_path}
        target: ${variables.nav_target}
        speed: 1.0

    - id: wait_navigate
      module: job
      action: status
      args:
        navigate_step_id: navigate_to_target
        # Navigation has a 30 s arrival budget in the Extension; allow that
        # plus some buffer for the job store TTL sweep.
        poll_interval_s: 0.5
        max_polls: 80

  assert:
    - id: character_exists
      module: stage
      action: assert_prim_exists
      args:
        prim_path: ${variables.char_prim_path}
        should_exist: true

    - id: read_state_back
      module: character
      action: get_state
      args:
        prim_path: ${variables.char_prim_path}

    - id: viewport_after_nav
      module: viewport
      action: capture
      args:
        width: 1280
        height: 720

  cleanup:
    # Stop the character to park the runtime in a quiescent state — even if
    # the scenario already reverts-to-Idle on navigate completion, this is a
    # safety net for paths that exit via timeout / cancel.
    - id: stop_animation
      module: character
      action: stop_animation
      args:
        prim_path: ${variables.char_prim_path}
      continueOnFailure: true

    # testbed caveat #14: without final sim ticks after world.reset, character
    # / NavMesh shutdown hooks can hang simulation_app.close(). Running a short
    # play/stop pair issues physics ticks that satisfy the shutdown sequence.
    - id: final_tick_play
      module: simulation
      action: play
      args: {}
      continueOnFailure: true

    - id: final_tick_stop
      module: simulation
      action: stop
      args: {}
      continueOnFailure: true

    - id: remove_character
      module: simulation
      action: stage_delete_prim
      args:
        prim_path: ${variables.char_prim_path}
      continueOnFailure: true

    # Shared character runtime infrastructure may remain in the stage/cache;
    # subsequent runs reuse it and the loader is idempotent.
